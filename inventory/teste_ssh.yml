all:
  hosts:
    master1:
      ansible_host: 127.0.0.1
      ansible_port: 2222
      ansible_user: vagrant
      ansible_ssh_private_key_file: .vagrant/machines/master1/virtualbox/private_key
      ssh_allowed_groups:
        - frontend
        - backend

    master2:
      ansible_host: 127.0.0.1
      ansible_port: 2200
      ansible_user: vagrant
      ansible_ssh_private_key_file: .vagrant/machines/master2/virtualbox/private_key
      ssh_allowed_groups:
        - devops
        - access